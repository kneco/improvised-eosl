<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Improvised EOSL</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, "Yu Gothic UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(680px, calc(100% - 48px));
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 650;
    }

    .subtitle {
      margin: 0 0 28px;
      color: GrayText;
      font-size: 15px;
    }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    input {
      min-width: 0;
      flex: 1;
      padding: 11px 12px;
      border: 1px solid ButtonBorder;
      border-radius: 6px;
      background: Field;
      color: FieldText;
      font: inherit;
    }

    button,
    .shortcut {
      border: 1px solid ButtonBorder;
      border-radius: 6px;
      background: ButtonFace;
      color: ButtonText;
      font: inherit;
    }

    button {
      padding: 10px 18px;
      cursor: pointer;
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .shortcut {
      display: block;
      padding: 14px;
      text-decoration: none;
    }

    .shortcut strong,
    .shortcut span {
      display: block;
    }

    .shortcut span {
      margin-top: 4px;
      color: GrayText;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Improvised EOSL</h1>
    <p class="subtitle">レガシーWebアプリケーション向け実験ブラウザー</p>

    <form action="https://www.google.com/search" method="get">
      <input name="q" type="search" aria-label="Webを検索" placeholder="Webを検索">
      <button type="submit">検索</button>
    </form>

    <nav class="shortcuts" aria-label="ショートカット">
      <a class="shortcut" href="parent.html">
        <strong>互換機能テスト</strong>
        <span>showModalDialogの検証ページ</span>
      </a>
      <a class="shortcut" href="legacy-ec-site.html">
        <strong>レガシーECサンプル</strong>
        <span>HTTP親・HTTP子での比較デモ</span>
      </a>
      <a class="shortcut" href="onhelp-return-false.html">
        <strong>onhelp return false fixture</strong>
        <span>IE-era F1/help suppression syntax validation</span>
      </a>
      <a class="shortcut" href="navigation-accelerator-reference.html">
        <strong>navigation accelerator fixture</strong>
        <span>Back, Forward, Reload, and Find key baseline measurement</span>
      </a>
      <a class="shortcut" href="https://www.google.com/">
        <strong>Google</strong>
        <span>一般サイトの表示確認</span>
      </a>
      <a class="shortcut" href="https://github.com/kneco/improvised-eosl">
        <strong>プロジェクト</strong>
        <span>ソースと技術資料</span>
      </a>
    </nav>
  </main>
</body>
</html>
