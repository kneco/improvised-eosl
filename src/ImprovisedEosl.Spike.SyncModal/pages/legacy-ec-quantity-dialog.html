<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数量入力</title>
  <style>
    body {
      margin: 20px;
      font-family: "MS PGothic", "Yu Gothic UI", sans-serif;
    }

    h1 { margin: 0 0 14px; font-size: 20px; }
    dl { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; }
    dt { font-weight: bold; }
    dd { margin: 0; }
    label { display: block; margin: 14px 0; }
    input { width: 90px; padding: 5px; font: inherit; }
    button { margin-right: 8px; padding: 7px 14px; font: inherit; }
  </style>
</head>
<body>
  <h1>数量を入力してください</h1>
  <dl>
    <dt>商品</dt><dd id="product"></dd>
    <dt>価格</dt><dd id="price"></dd>
  </dl>
  <label>数量 <input id="quantity" type="number" value="1" min="1" max="99"></label>
  <button id="accept" type="button">OK</button>
  <button id="cancel" type="button">キャンセル</button>

  <script>
    var args = window.dialogArguments || {};
    var quantity = document.getElementById("quantity");
    document.getElementById("product").textContent = args.productName || "(不明)";
    document.getElementById("price").textContent = Number(args.price || 0).toLocaleString() + "円";

    document.getElementById("accept").onclick = function () {
      window.returnValue = quantity.value;
      window.close();
    };
    document.getElementById("cancel").onclick = function () {
      window.returnValue = null;
      window.close();
    };
    quantity.focus();
    quantity.select();
  </script>
</body>
</html>
