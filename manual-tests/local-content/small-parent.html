<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Local HTML small-screen test</title>
  <style>
    body { box-sizing: border-box; margin: 0; padding: 12px; width: 340px; font: 14px/1.4 Arial, sans-serif; }
    h1 { margin: 0 0 10px; font-size: 20px; }
    button { padding: 6px 10px; }
    #result { margin-top: 10px; padding: 8px; border: 1px solid #888; overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <h1>Local small-screen parent</h1>
  <p>This file is intentionally separate from the bundled HTTP test pages.</p>
  <button type="button" onclick="openChild()">Open local child dialog</button>
  <div id="result">No result yet.</div>
  <script>
    function openChild() {
      var result = window.showModalDialog(
        "small-dialog.html",
        { source: "local-small-parent", value: 42 },
        "dialogWidth:320px;dialogHeight:220px;resizable:no");
      document.getElementById("result").textContent =
        typeof result === "undefined" ? "Returned undefined" : "Returned: " + result;
    }
  </script>
</body>
</html>
